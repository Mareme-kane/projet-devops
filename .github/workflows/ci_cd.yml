name: 🚀 Production CI/CD

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: 🛠️ Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, zip, pdo_mysql, fileinfo
          coverage: xdebug

      - name: 🔎 Verify PHP version and extensions
        run: |
          php -v
          php -m | findstr xdebug

      - name: 📦 Install all dependencies (including dev)
        run: composer install --prefer-dist --no-progress

     - name: 🔎 Verify PHPUnit installation
      shell: bash
      run: ls -la vendor/bin/


      - name: 🏗️ Prepare Laravel Application
        run: |
         cp .env.example .env
         php artisan key:generate

      - name: 🧪 Run unit tests
        run: vendor/bin/phpunit

      - name: 📦 Install production dependencies only
        run: composer install --prefer-dist --no-progress --no-dev --optimize-autoloader

      - name: 📦 Install Node.js dependencies
        run: npm ci
        continue-on-error: true

      - name: 📦 Install Node.js dependencies (fallback)
        run: npm install
        if: failure()

      - name: 📝 Run frontend tests (or skip if not set up)
        run: npm test || echo "No frontend tests configured - skipping this step"
        continue-on-error: true

  sonarcloud-analysis:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-deploy:
    needs: [deploy-production, sonarcloud-analysis]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/laravel-app:prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📜 Show Laravel Logs (Debugging)
        run: cat storage/logs/laravel.log || echo "No logs found"

      - name: 🛡️ Add SSH Known Hosts
        run: ssh-keyscan -H ec2-13-61-8-178.eu-north-1.compute.amazonaws.com >> ~/.ssh/known_hosts

      - name: 🔑 Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          if_key_exists: replace

      - name: 📥 Download artifact from GitHub Packages
        uses: actions/download-artifact@v4
        with:
            name: laravel-app-prod-${{ github.sha }}
            path: .

      - name: 🧐 List downloaded files (debugging)
        run: ls -la

      - name: 🚀 Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ec2-13-61-8-178.eu-north-1.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "laravel-app-prod-${{ github.sha }}.zip"
          target: "/home/ubuntu"

      - name: ⚙️ Execute remote deployment
        uses: appleboy/ssh-action@master
        with:
          host: ec2-13-61-8-178.eu-north-1.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu
            unzip -o laravel-app-prod-${{ github.sha }}.zip -d laravel-app
            cd laravel-app/deploy
            ./deploy.sh
